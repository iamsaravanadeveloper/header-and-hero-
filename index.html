<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zuhaus-Real Estate</title>
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=person" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=add" />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./index.css" />

<body>
    <header>
        <div class="header-left">
            <div class="logo"><img src="./assets/logo-light.png" alt=""></div>
            <nav>
                <a href="home.html">HOME</a>
                <a href="pages.html">PAGES</a>
                <a href="listings.html">LISTINGS</a>
                <a href="blog.html">BLOG</a>
                <a href="shop.html">SHOP</a>
                <a href="elements.html">ELEMENTS</a>
            </nav>
        </div>
        <div class="header-right">
            <button class="add-btn">Add Listing <span class="material-symbols-outlined">
                    add
                </span></button>
            <button class="user-btn"><span class="material-symbols-outlined">
                    person
                </span></button>
        </div>
    </header>
    <section class="hero">
        <h1 style="margin-top: 40px;">Find Best Places to Be</h1>
        <div class="icons">
            <div class="image1">
                <img src="assets/type-6-img-light.png" alt="apartment">
                <p>Apartment</p>
            </div>
            <div class="images">
                <img src="assets/type-4-img-light.png" alt="building">
                <p>Building</p>
            </div>
            <div class="images">
                <img src="assets/type-5-img-light.png" alt="condominium">
                <p>Condominium</p>
            </div>
            <div class="images">
                <img src="assets/type-6-img-light.png" alt="house">
                <p>House</p>
            </div>
            <div class="images">
                <img src="assets/type-1-img-light.png" alt="office">
                <p>Office</p>
            </div>
            <div class="images">
                <img src="assets/type-2-img-light.png" alt="shop">
                <p>Shop</p>
            </div>
        </div>
        <div class="search-location">
            <div>
                <p>Choose a locaion</p>
                <select name="location" id="location">
                    <option>All Locations</option>
                    <option value="Madurai">Madurai</option>
                    <option value="Chennai">Chennai</option>
                    <option value="Salem">Salem</option>
                </select>
            </div>

            <div>
                <p>Status</p>
                <select name="location" id="location">
                <option>All Properties</option>
                <option value="For Rent">For Rent</option>
                <option value="Just Sold">Just Sold</option>
                <option value="For Sale">For Sale</option>
            </select>
            </div>
            <div>
                <button class="search-btn">Search</button>
            </div>
            
        </div>
    </section>
</body>

</html>
